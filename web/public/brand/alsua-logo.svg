<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="ALSUA">
  <title>ALSUA</title>
  <!--
    Recreación fiel del logo ALSUA:
    - Círculo naranja #F89D2D con A blanca bold itálica
    - Wordmark LSUA en el mismo naranja / peso / inclinación
    - ® superior derecha
  -->
  <g transform="translate(10 10)">
    <circle cx="120" cy="120" r="120" fill="#F89D2D"/>
    <text
      x="120" y="168"
      text-anchor="middle"
      fill="#FFFFFF"
      font-family="Noto Sans, Arial Black, Arial, sans-serif"
      font-size="168"
      font-weight="900"
      font-style="italic"
    >A</text>
  </g>
  <text
    x="270" y="178"
    fill="#F89D2D"
    font-family="Noto Sans, Arial Black, Arial, sans-serif"
    font-size="148"
    font-weight="900"
    font-style="italic"
    letter-spacing="-2"
  >LSUA</text>
  <g transform="translate(750 48)" fill="#F89D2D">
    <circle cx="14" cy="14" r="13" fill="none" stroke="#F89D2D" stroke-width="3"/>
    <text x="14" y="19" text-anchor="middle"
      font-family="Noto Sans, Arial, sans-serif"
      font-size="14" font-weight="700">R</text>
  </g>
</svg>
